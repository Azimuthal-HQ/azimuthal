# .gitleaks.toml — Azimuthal secret scanning configuration

title = "azimuthal secret scanning"

[extend]
  useDefault = true

# ── Azimuthal-specific rules ──────────────────────────────────

[[rules]]
  id = "azimuthal-license-private-key"
  description = "Azimuthal enterprise license private key"
  regex = '''-----BEGIN (RSA |EC )?PRIVATE KEY-----'''
  tags = ["key", "enterprise", "critical"]

[[rules]]
  id = "azimuthal-jwt-secret"
  description = "Hardcoded JWT secret"
  regex = '''(?i)(jwt[_\-]?secret|JWT_SECRET)\s*[=:]\s*["']?[A-Za-z0-9+/]{32,}'''
  tags = ["jwt", "auth"]

[[rules]]
  id = "azimuthal-database-url"
  description = "Database connection string with hardcoded credentials (excludes env-var references)"
  # Negative lookahead (?!\$\{) skips env-var substitutions like postgres://user:${PASSWORD}@...
  regex = '''postgres://[^:]+:(?!\$\{)[^@]{6,}@[^/]+/\w+'''
  tags = ["database", "credentials"]

[[rules]]
  id = "azimuthal-storage-credentials"
  description = "S3/MinIO access credentials"
  regex = '''(?i)(aws_secret_access_key|minio_secret_key|STORAGE_SECRET)\s*[=:]\s*["']?[A-Za-z0-9/+=]{20,}'''
  tags = ["storage", "credentials"]

# ── Allowlist ─────────────────────────────────────────────────

[allowlist]
  description = "Global allowlist — dev credentials, CI config, and placeholder values"
  paths = [
    # Test and example files
    '''testdata/''',
    '''_test\.go''',
    '''\.env\.example''',
    '''docker-compose\.example\.yml''',
    '''docs/''',
    # CI workflow files contain test DATABASE_URLs and are not real secrets
    '''\.github/workflows/''',
    # Makefile contains DATABASE_URL dev default — not a real secret
    '''Makefile''',
    # Dev docker-compose uses placeholder credentials (minioadmin, dev password)
    '''build/docker-compose\.dev\.yml''',
    # Project docs and context files
    '''CLAUDE\.md''',
  ]
  regexes = [
    '''your[_-]?(secret|password|key|token)''',
    '''changeme''',
    '''example[_-]?(secret|key)''',
    '''azimuthal[_-]?(secret|key|token)[_-]?here''',
    '''TEST.*CERTIFICATE''',
    # Dev-only MinIO placeholder credentials
    '''minioadmin''',
    # Localhost-only postgres URLs with dev/test passwords
    '''postgres://[^:]+:(dev|testpassword|password|secret)@(localhost|127\.0\.0\.1|postgres)''',
  ]
