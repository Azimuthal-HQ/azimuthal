version: "3.9"

# Development override — extends docker-compose.yml with local conveniences.
# Usage: docker compose -f build/docker-compose.dev.yml up -d

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: azimuthal
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: azimuthal_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azimuthal -d azimuthal_dev"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - azimuthal_dev

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data
    networks:
      - azimuthal_dev

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - azimuthal_dev

volumes:
  postgres_dev_data:
  minio_dev_data:

networks:
  azimuthal_dev:
    driver: bridge
