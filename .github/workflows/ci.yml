name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'
  POSTGRES_VERSION: '16'
  BINARY_NAME: azimuthal

jobs:

  # ─────────────────────────────────────────────────────────────
  # GATE 1: Build
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build binary
        run: go build -v -o /tmp/${{ env.BINARY_NAME }} ./cmd/server

      - name: Vet
        run: go vet ./...


  # ─────────────────────────────────────────────────────────────
  # GATE 2: Test
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: azimuthal_test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: azimuthal_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9001:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://azimuthal_test:testpassword@localhost:5433/azimuthal_test?sslmode=disable
      JWT_SECRET: ci-test-secret-32-chars-minimum-xx
      STORAGE_ENDPOINT: http://localhost:9001
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: azimuthal-test
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run migrations
        run: |
          if find migrations -name '*.sql' -quit 2>/dev/null | grep -q .; then
            goose -dir migrations postgres "$DATABASE_URL" up
          else
            echo "No SQL migration files found — skipping (scaffold phase)"
          fi

      - name: Run tests with race detector
        run: |
          go test \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/... \
            -timeout=120s \
            ./...

      - name: Enforce minimum coverage (60%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below the 60% floor"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets minimum"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7


  # ─────────────────────────────────────────────────────────────
  # GATE 3: Lint
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --config=.golangci.yml --timeout=5m

      - name: Check go.sum is up to date
        run: |
          go mod tidy
          git diff --exit-code go.sum || \
            (echo "❌ go.sum out of date — run go mod tidy" && exit 1)


  # ─────────────────────────────────────────────────────────────
  # GATE 4A: SAST
  # ─────────────────────────────────────────────────────────────
  sast:
    name: SAST (gosec)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run gosec (SARIF output)
        uses: securego/gosec@master
        with:
          args: >-
            -severity high
            -confidence high
            -exclude-dir=vendor
            -fmt sarif
            -out gosec-results.sarif
            ./...

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true  # requires GitHub Advanced Security; skip gracefully on free plans
        with:
          sarif_file: gosec-results.sarif
          category: gosec

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Fail on HIGH+ findings
        run: |
          gosec \
            -severity high \
            -confidence high \
            -exclude-dir=vendor \
            ./...


  # ─────────────────────────────────────────────────────────────
  # GATE 4B: Dependency vulnerability scanning
  # ─────────────────────────────────────────────────────────────
  vuln-scan:
    name: Dependency Scan (govulncheck)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Generate JSON vulnerability report
        if: always()
        run: govulncheck -json ./... > vuln-report.json || true

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vuln-report
          path: vuln-report.json
          retention-days: 7


  # ─────────────────────────────────────────────────────────────
  # GATE 4C: Secret scanning
  # ─────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml


  # ─────────────────────────────────────────────────────────────
  # GATE 4D: Container scanning
  # ─────────────────────────────────────────────────────────────
  container-scan:
    name: Container Scan (trivy)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=pr-${{ github.sha }} \
            -t ${{ env.BINARY_NAME }}:scan-${{ github.sha }} \
            -f build/Dockerfile \
            .

      - name: Run Trivy (SARIF output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BINARY_NAME }}:scan-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true  # requires GitHub Advanced Security; skip gracefully on free plans
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Fail on HIGH/CRITICAL findings
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BINARY_NAME }}:scan-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library

      - name: Clean up image
        if: always()
        run: docker rmi ${{ env.BINARY_NAME }}:scan-${{ github.sha }} || true


  # ─────────────────────────────────────────────────────────────
  # FINAL GATE
  # ─────────────────────────────────────────────────────────────
  all-checks:
    name: All Gates Passed
    needs: [test, lint, sast, vuln-scan, secret-scan, container-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all gates
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ One or more pipeline gates failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "⚠️ One or more pipeline gates were cancelled"
            exit 1
          fi
          echo "✅ All gates passed — safe to merge"
