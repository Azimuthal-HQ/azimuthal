name: Release (Enterprise)

# This workflow lives in the PRIVATE azimuthal-ee repo.
# It vendors the community repo and builds with the enterprise tag.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-ee'  # e.g. v1.2.3-ee

env:
  GO_VERSION: '1.23'
  REGISTRY: ghcr.io
  IMAGE_NAME: azimuthal-hq/azimuthal-ee
  BINARY_NAME: azimuthal

jobs:

  build-enterprise:
    name: Build Enterprise Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout azimuthal-ee (this repo)
        uses: actions/checkout@v4
        with:
          path: azimuthal-ee

      - name: Checkout azimuthal community repo
        uses: actions/checkout@v4
        with:
          repository: Azimuthal-HQ/azimuthal
          ref: ${{ vars.COMMUNITY_TAG }}
          path: azimuthal
          token: ${{ secrets.COMMUNITY_REPO_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Vendor EE code into community module
        run: |
          cp -r azimuthal-ee/internal/enterprise/* azimuthal/internal/enterprise/
          cp -r azimuthal-ee/internal/license azimuthal/internal/license

      - name: Build frontend
        run: cd azimuthal/web && npm ci && npm run build

      - name: Build enterprise binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd azimuthal
          go build \
            -tags enterprise \
            -trimpath \
            -ldflags="-s -w \
              -X main.Version=${{ env.VERSION }} \
              -X main.Edition=enterprise \
              -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ../${{ env.BINARY_NAME }}-enterprise-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/server

      - name: Generate checksum
        run: |
          sha256sum \
            ${{ env.BINARY_NAME }}-enterprise-${{ matrix.goos }}-${{ matrix.goarch }} \
            > ${{ env.BINARY_NAME }}-enterprise-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ee-binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY_NAME }}-enterprise-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 1

  docker-enterprise:
    name: Build & Push Enterprise Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout azimuthal-ee
        uses: actions/checkout@v4
        with:
          path: azimuthal-ee

      - name: Checkout azimuthal community repo
        uses: actions/checkout@v4
        with:
          repository: Azimuthal-HQ/azimuthal
          ref: ${{ vars.COMMUNITY_TAG }}
          path: azimuthal
          token: ${{ secrets.COMMUNITY_REPO_TOKEN }}

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Vendor EE code
        run: |
          cp -r azimuthal-ee/internal/enterprise/* azimuthal/internal/enterprise/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest-ee

      - name: Build and push enterprise image
        uses: docker/build-push-action@v5
        with:
          context: ./azimuthal
          file: ./azimuthal/build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_TAGS=enterprise
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-audit:
    name: Enterprise Security Audit
    needs: build-enterprise
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: SAST on enterprise code
        uses: securego/gosec@master
        with:
          args: >-
            -severity medium
            -confidence high
            -fmt sarif
            -out ee-gosec.sarif
            ./internal/enterprise/...

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ee-gosec.sarif
          category: gosec-enterprise

      - name: Dependency audit
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: License compliance — no AGPL allowed
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... --disallowed_types=forbidden,restricted
