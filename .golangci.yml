# .golangci.yml — Azimuthal linter configuration
# Compatible with golangci-lint v1.60+

version: "2"

run:
  timeout: 5m
  tests: true

issues:
  exclude-dirs:
    - vendor
    - internal/db/generated

  exclude-rules:
    - path: _test\.go
      linters:
        - funlen
        - gocognit
        - cyclop
        - wrapcheck
    - path: internal/db/generated
      linters:
        - all
    - linters: [godox]
      text: "TODO"

  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    # Correctness
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style
    - gofmt
    - goimports
    - misspell
    - whitespace
    # Complexity
    - cyclop
    - gocognit
    - funlen
    # Security
    - gosec
    - bodyclose
    - sqlclosecheck
    - rowserrcheck
    # Performance
    - prealloc
    - noctx
    # Error handling
    - wrapcheck
    - errorlint
    # Go idioms
    - godox
    - nolintlint
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  gosec:
    severity: high
    confidence: high
    excludes:
      - G104

  cyclop:
    max-complexity: 15
    package-average: 10.0

  gocognit:
    min-complexity: 20

  funlen:
    lines: 80
    statements: 50

  godox:
    keywords:
      - FIXME
      - HACK

  revive:
    rules:
      - name: exported
        arguments: ["checkPrivateReceivers"]
      - name: var-naming
      - name: package-comments

  wrapcheck:
    ignorePackageGlobs:
      - "github.com/Azimuthal-HQ/azimuthal/*"
