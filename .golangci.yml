# .golangci.yml — Azimuthal linter configuration
# Requires golangci-lint v2.x (used via golangci-lint-action@v7)

version: "2"

run:
  timeout: 5m
  # Note: 'tests: true' was removed in golangci-lint v2; tests are always linted.

issues:
  exclude-dirs:
    - vendor
    - internal/db/generated

  exclude-rules:
    - path: _test\.go
      linters:
        - funlen
        - gocognit
        - cyclop
        - wrapcheck
    - path: internal/db/generated
      linters:
        - all
    - linters: [godox]
      text: "TODO"

  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    # Correctness
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style
    - gofmt
    - goimports
    - misspell
    # Complexity
    - cyclop
    - gocognit
    - funlen
    # Security
    - gosec
    - bodyclose
    # Error handling
    - wrapcheck
    - errorlint
    # Go idioms
    - godox
    - nolintlint
    - revive

  # In golangci-lint v2, linter settings are nested under linters.settings
  # (no longer a top-level 'linters-settings' key)
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    gosec:
      severity: high
      confidence: high
      excludes:
        - G104

    cyclop:
      max-complexity: 15
      package-average: 10.0

    gocognit:
      min-complexity: 20

    funlen:
      lines: 80
      statements: 50

    godox:
      keywords:
        - FIXME
        - HACK

    revive:
      rules:
        - name: exported
          arguments: ["checkPrivateReceivers"]
        - name: var-naming
        - name: package-comments

    wrapcheck:
      ignorePackageGlobs:
        - "github.com/Azimuthal-HQ/azimuthal/*"
