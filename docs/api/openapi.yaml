  securitySchemes:
    BearerAuth:
      description: 'JWT Bearer token. Format: "Bearer <token>". Obtain via POST /api/v1/auth/login'
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  contact:
    email: hello@azimuthalhq.com
    name: Azimuthal HQ
    url: https://azimuthalhq.com
  description: |-
    The fully open-source alternative to Jira, Confluence, and Jira Service Desk.
    Self-hostable, single binary, Apache 2.0 licensed.

    ## Authentication
    All endpoints except /auth/login and /auth/register require a Bearer JWT token.
    Obtain a token via POST /api/v1/auth/login, then include it as:
    `Authorization: Bearer <your-token>`
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Azimuthal API
  version: "1.0"
openapi: 3.1.0
paths:
  /auth/login:
    post:
      description: Validates email and password, returns JWT access/refresh tokens
        and user profile with primary org.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.SwaggerLoginRequest'
                description: Login credentials
                summary: body
        description: Login credentials
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerLoginResponse'
          description: Authenticated successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Missing email or password
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Invalid credentials
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Internal error
      summary: Authenticate user
      tags:
      - auth
  /auth/logout:
    post:
      description: Deletes all sessions for the current user.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerLogoutResponse'
          description: Logged out
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Not authenticated
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Internal error
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the profile of the currently authenticated user.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerUserResponse'
          description: User profile
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Not authenticated
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Internal error
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
    patch:
      description: Updates the display name and email of the currently authenticated
        user.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/auth.updateMeRequest'
                description: Profile fields
                summary: body
        description: Profile fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerUserResponse'
          description: Updated profile
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Validation error
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Not authenticated
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Internal error
      security:
      - BearerAuth: []
      summary: Update current user
      tags:
      - auth
  /auth/refresh:
    post:
      description: Exchanges a valid refresh token for a new access/refresh token
        pair.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.SwaggerRefreshRequest'
                description: Refresh token
                summary: body
        description: Refresh token
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerRefreshResponse'
          description: New token pair
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Missing refresh_token
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Invalid or expired refresh token
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Internal error
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      description: Creates a new user account with a personal organization, returns
        JWT tokens.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.SwaggerRegisterRequest'
                description: Registration details
                summary: body
        description: Registration details
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerLoginResponse'
          description: User created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Validation error
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Email already in use
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Internal error
      summary: Register new user
      tags:
      - auth
  /health:
    get:
      description: Returns {"status":"ok"} when the server is running.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.healthResponse'
          description: Server is alive
      summary: Liveness probe
      tags:
      - health
  /orgs/{orgID}:
    get:
      description: Returns an organization by its ID.
      parameters:
      - description: Organization ID (UUID)
        in: path
        name: orgID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                type: object
          description: Organization details
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Invalid org ID
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Not authenticated
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Not found
      security:
      - BearerAuth: []
      summary: Get organization
      tags:
      - spaces
    patch:
      description: Updates an organization's name and description (preserves plan).
      parameters:
      - description: Organization ID (UUID)
        in: path
        name: orgID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.SwaggerUpdateOrgRequest'
                description: Updated org fields
                summary: body
        description: Updated org fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                type: object
          description: Updated organization
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Validation error
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Not authenticated
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Internal error
      security:
      - BearerAuth: []
      summary: Update organization
      tags:
      - spaces
  /orgs/{orgID}/labels:
    get:
      description: Returns all labels for an organization
      parameters:
      - description: Organization ID (UUID)
        in: path
        name: orgID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  additionalProperties: {}
                  type: object
                type: array
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: List labels
      tags:
      - labels
    post:
      description: Creates a new label for an organization
      parameters:
      - description: Organization ID (UUID)
        in: path
        name: orgID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.SwaggerCreateLabelRequest'
                description: Label details
                summary: body
        description: Label details
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                additionalProperties: {}
                type: object
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Unauthorized
        "409":
