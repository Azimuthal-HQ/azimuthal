            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create a label
      tags:
      - labels
  /orgs/{orgID}/labels/{labelID}:
    delete:
      description: Removes a label from an organization
      parameters:
      - description: Organization ID (UUID)
        in: path
        name: orgID
        required: true
        schema:
          type: string
      - description: Label ID (UUID)
        in: path
        name: labelID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.SwaggerErrorResponse'
          description: Bad Request
        "401":
          content:
